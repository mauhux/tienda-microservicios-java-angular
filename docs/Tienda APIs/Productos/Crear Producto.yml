info:
  name: Crear Producto
  type: http
  seq: 3

http:
  method: POST
  url: "{{producto-url}}/api/v1/productos"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: "{\r

      \  \"descripcion\": \"Monitor Samsung 24\",\r

      \  \"precioUnitario\": 700.00,\r

      \  \"stock\": 15,\r

      \  \"estado\": \"DISPONIBLE\",\r

      \  \"imgUrl\": \"https://example.com/monitor.jpg\"\r

      }"
  auth: inherit

settings:
  encodeUrl: false
  timeout: 0
  followRedirects: true
  maxRedirects: 5
