      value: application/json
  body:
    type: json
    data: "{\r

      \  \"clienteId\": 1,\r

      \  \"detalles\": [\r

      \    {\r

      \      \"productoId\": 1,\r

      \      \"cantidad\": 1\r

      \    },\r

      \    {\r

      \      \"productoId\": 2,\r

      \      \"cantidad\": 2\r

      \    }\r

      \  ]\r

      }"
  auth: inherit

settings:
  encodeUrl: false
  timeout: 0
  followRedirects: true
  maxRedirects: 5
